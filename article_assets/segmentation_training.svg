<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="460" viewBox="0 0 1480 460">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f1f4ef"/>
      <stop offset="100%" stop-color="#f4ece5"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#23303b"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', sans-serif; fill: #1f2933; }
      .subtitle { font: 500 18px 'Segoe UI', sans-serif; fill: #43515c; }
      .boxTitle { font: 700 20px 'Segoe UI', sans-serif; fill: #12202b; }
      .boxText { font: 500 15px 'Segoe UI', sans-serif; fill: #27323b; }
      .arrow { stroke: #23303b; stroke-width: 4; fill: none; marker-end: url(#arrow2); }
    </style>
  </defs>
  <rect width="1480" height="460" rx="28" fill="url(#bg2)"/>
  <text x="56" y="60" class="title">Training Pipeline for the Segmentation Article</text>
  <text x="56" y="92" class="subtitle">Supervised optimization with overlap, boundary, topology, and AZ regularization terms</text>

  <rect x="60" y="150" width="180" height="110" rx="20" fill="#fff6dc" stroke="#d8b75a" stroke-width="3"/>
  <text x="92" y="193" class="boxTitle">Input Image</text>
  <text x="92" y="223" class="boxText">retinal frame</text>

  <rect x="60" y="300" width="180" height="110" rx="20" fill="#e7f4ef" stroke="#4f8a6c" stroke-width="3"/>
  <text x="90" y="343" class="boxTitle">GT Mask</text>
  <text x="90" y="373" class="boxText">manual vessel label</text>

  <rect x="320" y="180" width="260" height="150" rx="24" fill="#e7edf9" stroke="#4e7eaa" stroke-width="3"/>
  <text x="355" y="225" class="boxTitle">Segmentation Network</text>
  <text x="355" y="255" class="boxText">encoder + AZ blocks + decoder</text>
  <text x="355" y="280" class="boxText">main logits</text>
  <text x="355" y="305" class="boxText">optional aux / boundary heads</text>

  <rect x="670" y="140" width="250" height="90" rx="20" fill="#f8e7e5" stroke="#bf6a5a" stroke-width="3"/>
  <text x="708" y="182" class="boxTitle">Main Prediction</text>
  <text x="708" y="210" class="boxText">sigmoid(logits) -&gt; p(x)</text>

  <rect x="670" y="250" width="250" height="90" rx="20" fill="#ece7f6" stroke="#7d64a8" stroke-width="3"/>
  <text x="708" y="292" class="boxTitle">Auxiliary Outputs</text>
  <text x="708" y="320" class="boxText">aux logits / boundary logits</text>

  <rect x="1000" y="130" width="360" height="220" rx="26" fill="#ffffff" stroke="#23303b" stroke-width="2.5"/>
  <text x="1030" y="175" class="boxTitle">Training Objective</text>
  <text x="1030" y="210" class="boxText">BCE + Dice/Tversky overlap</text>
  <text x="1030" y="238" class="boxText">+ auxiliary supervision</text>
  <text x="1030" y="266" class="boxText">+ boundary loss</text>
  <text x="1030" y="294" class="boxText">+ topology-aware soft clDice</text>
  <text x="1030" y="322" class="boxText">+ AZ regularization (entropy, smoothness, geometry, anisotropy gap)</text>

  <path class="arrow" d="M240 205 H320"/>
  <path class="arrow" d="M240 355 C280 355, 280 255, 320 255"/>
  <path class="arrow" d="M580 225 H670"/>
  <path class="arrow" d="M580 285 H670"/>
  <path class="arrow" d="M920 185 H1000"/>
  <path class="arrow" d="M920 295 H1000"/>

  <text x="1070" y="394" class="subtitle">Optimization updates the segmentation architecture and AZ kernel parameters jointly.</text>
</svg>
