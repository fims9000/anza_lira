# Milder thin-structure sampling probe for stabilized local-geometry az_thesis.
# The aggressive thin-bias probe recovered recall but lost too much precision.

variant_overrides:
  az_thesis:
    num_rules: 4
    model_widths: [32, 64, 128, 192]

    encoder_az_stages: 1
    encoder_block_mode: hybrid_shallow
    hybrid_mix_init: 0.35
    bottleneck_mode: aspp
    decoder_mode: residual
    boundary_mode: conv

    az_geometry_mode: local_hyperbolic
    az_learn_directions: true
    az_min_hyperbolicity: 0.15

    retinal_foreground_bias: 0.70
    retinal_foreground_bias_end: 0.35
    retinal_foreground_bias_schedule: linear
    retinal_thin_vessel_bias: 0.25
    retinal_thin_vessel_bias_end: 0.05
    retinal_thin_vessel_bias_schedule: linear
    retinal_thin_vessel_neighbor_threshold: 4

    lr: 0.0003
    overlap_mode: dice
    aux_loss_weight: 0.1
    boundary_loss_weight: 0.05
    topology_loss_weight: 0.0
    bce_pos_weight: 10.0

    reg_membership_entropy: 0.0
    reg_membership_smoothness: 0.0
    reg_geometry_smoothness: 0.0001
    reg_hyperbolicity: 0.01
    reg_anisotropy_gap: 0.0

    seg_threshold: 0.5
    eval_threshold_sweep: true
    eval_threshold_metric: core_mean
    eval_threshold_start: 0.25
    eval_threshold_end: 0.95
    eval_threshold_step: 0.05
