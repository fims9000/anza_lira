# Neighbor probe around the best AZ recipe.
# Slightly weaker topology pressure and core-mean thresholding previously gave
# almost the same Dice with better recall/balanced accuracy.

dataset: drive
data_root: ./data
val_fraction: 0.2
use_fov_mask: true

variant: az_cat
num_rules: 6
model_widths: [40, 80, 144, 208]
bottleneck_mode: aspp
decoder_mode: residual
boundary_mode: conv

epochs: 120
batch_size: 2
lr: 0.0002
weight_decay: 0.0001
seed: 42
deterministic: false
num_workers: 0

drive_patch_size: 256
drive_foreground_bias: 0.75

bce_weight: 1.0
dice_weight: 1.0
overlap_mode: dice
tversky_alpha: 0.5
tversky_beta: 0.5
seg_threshold: 0.6
eval_threshold_sweep: true
eval_threshold_metric: core_mean
eval_threshold_start: 0.3
eval_threshold_end: 0.8
eval_threshold_step: 0.05

aux_loss_weight: 0.2
boundary_loss_weight: 0.1
topology_loss_weight: 0.03
topology_num_iters: 10
bce_pos_weight: 4.5

reg_membership_entropy: 0.0005
reg_membership_smoothness: 0.0005
reg_geometry_smoothness: 0.0005
reg_hyperbolicity: 0.001
reg_anisotropy_gap: 0.0

results_dir: ./results/article_latest_only
run_name: drive_az_cat_recall_coremean_s42_e120
device: cuda

timing_warmup: 1
timing_iters: 5
