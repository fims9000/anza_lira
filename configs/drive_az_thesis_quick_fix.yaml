# Quick architecture probe for az_thesis on DRIVE.
# Use with scripts/run_drive_multiseed.py --variant-overrides.
#
# Goal: keep the proposed AZ geometry as an interpretable encoder-side
# component, but avoid the unstable "pure AZ everywhere" setting during a
# short diagnostic run.

variant_overrides:
  az_thesis:
    num_rules: 4
    model_widths: [32, 64, 128, 192]

    # Stabilization: use AZ as a shallow geometric branch, not as the whole U-Net.
    encoder_az_stages: 1
    encoder_block_mode: hybrid_shallow
    hybrid_mix_init: 0.2
    bottleneck_mode: aspp
    decoder_mode: residual
    boundary_mode: conv
    az_geometry_mode: local_hyperbolic
    az_learn_directions: true
    az_min_hyperbolicity: 0.15

    # Fast diagnostic loss: remove heavy regularizers first, then add back only
    # if the core segmentation quality improves.
    lr: 0.0003
    overlap_mode: dice
    aux_loss_weight: 0.1
    boundary_loss_weight: 0.03
    topology_loss_weight: 0.0
    bce_pos_weight: 8.0
    bce_pos_weight_min: 1.0
    bce_pos_weight_max: 20.0
    reg_membership_entropy: 0.0
    reg_membership_smoothness: 0.0
    reg_geometry_smoothness: 0.0001
    reg_hyperbolicity: 0.01
    reg_anisotropy_gap: 0.0

    # For quick runs Dice is easier to interpret than the mixed core_mean gate.
    seg_threshold: 0.5
    eval_threshold_sweep: true
    eval_threshold_metric: dice
    eval_threshold_start: 0.25
    eval_threshold_end: 0.95
    eval_threshold_step: 0.05
