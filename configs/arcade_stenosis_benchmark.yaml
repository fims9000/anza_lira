# Benchmark config for ARCADE coronary vessel segmentation (stenosis objective).
# Use together with scripts/run_drive_multiseed.py and explicit --variants.

dataset: arcade_stenosis
data_root: ./data

variant: az_cat
num_rules: 6
az_init_anisotropy_gap: 0.35
model_widths: [32, 64, 128, 192]

epochs: 40
batch_size: 2
lr: 0.0002
weight_decay: 0.0001
seed: 42
deterministic: false
num_workers: 0

arcade_patch_size: 256
arcade_augment: true

bce_weight: 1.0
dice_weight: 1.0
overlap_mode: dice
seg_threshold: 0.5
eval_threshold_sweep: true
eval_threshold_metric: core_mean
eval_threshold_start: 0.3
eval_threshold_end: 0.7
eval_threshold_step: 0.025
aux_loss_weight: 0.2
boundary_loss_weight: 0.1
topology_loss_weight: 0.02
topology_num_iters: 10
bce_pos_weight: auto
bce_pos_weight_min: 1.0
bce_pos_weight_max: 20.0

reg_membership_entropy: 0.0005
reg_membership_smoothness: 0.0005
reg_geometry_smoothness: 0.0005
reg_hyperbolicity: 0.001
reg_anisotropy_gap: 0.0005

results_dir: ./results
run_name: null
device: null

timing_warmup: 1
timing_iters: 5
