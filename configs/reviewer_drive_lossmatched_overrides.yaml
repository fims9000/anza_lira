# Reviewer-oriented fair comparison pack for DRIVE.
# Idea: same training policy/loss for all variants; architecture is the key difference.

variant_overrides:
  baseline:
    model_widths: [40, 80, 144, 208]
    lr: 0.0002
    overlap_mode: dice
    tversky_alpha: 0.5
    tversky_beta: 0.5
    aux_loss_weight: 0.2
    boundary_loss_weight: 0.1
    topology_loss_weight: 0.05
    topology_num_iters: 10
    bce_pos_weight: 4.5
    seg_threshold: 0.6
    eval_threshold_sweep: true
    eval_threshold_metric: dice
    eval_threshold_start: 0.3
    eval_threshold_end: 0.8
    eval_threshold_step: 0.05

