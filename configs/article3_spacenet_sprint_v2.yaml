dataset: global_roads
data_root: ./data/SpaceNet3_prepared
gis_test_split: in-domain-test

variant: az_thesis
num_rules: 6
model_widths: [32, 64, 128, 192]
encoder_az_stages: 1
encoder_block_mode: hybrid
hybrid_mix_init: 0.10
hybrid_mix_target: 0.08
az_init_anisotropy_gap: 0.18
bottleneck_mode: aspp
decoder_mode: residual
boundary_mode: conv
az_use_input_residual: true
az_residual_init: 0.20
az_compatibility_floor: 0.0005

epochs: 14
batch_size: 2
lr: 0.00015
weight_decay: 0.0001
seed: 42
deterministic: false
num_workers: 0

gis_image_size: [256, 256]
gis_patch_size: 256
gis_foreground_bias: 0.60
gis_augment: true

bce_weight: 1.0
dice_weight: 1.0
overlap_mode: tversky
tversky_alpha: 0.45
tversky_beta: 0.55
seg_threshold: 0.60
eval_threshold_sweep: true
eval_threshold_metric: core_mean
eval_threshold_start: 0.30
eval_threshold_end: 0.90
eval_threshold_step: 0.05
eval_threshold_min_recall: 0.40
aux_loss_weight: 0.08
boundary_loss_weight: 0.03
topology_loss_weight: 0.0
topology_num_iters: 8
bce_pos_weight: 4.5
bce_pos_weight_min: 1.0
bce_pos_weight_max: 20.0

reg_membership_entropy: 0.00025
reg_membership_smoothness: 0.0003
reg_geometry_smoothness: 0.0003
reg_hyperbolicity: 0.0005
reg_anisotropy_gap: 0.0001
reg_hybrid_mix: 0.001

results_dir: ./results
run_name: article3_spacenet_sprint_v2
device: cpu

timing_warmup: 1
timing_iters: 5
