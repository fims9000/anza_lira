# Fast small-dataset probe overrides (CPU-friendly).
# Purpose: get directional signal while long GPU jobs are running.

variant_overrides:
  baseline:
    model_widths: [24, 48, 96, 144]
    retinal_patch_size: 256
    lr: 0.0003
    overlap_mode: dice
    aux_loss_weight: 0.1
    boundary_loss_weight: 0.05
    topology_loss_weight: 0.03
    topology_num_iters: 10
    bce_pos_weight: auto
    bce_pos_weight_min: 1.0
    bce_pos_weight_max: 25.0
    seg_threshold: 0.6
    eval_threshold_sweep: true
    eval_threshold_metric: dice
    eval_threshold_start: 0.3
    eval_threshold_end: 0.8
    eval_threshold_step: 0.05

