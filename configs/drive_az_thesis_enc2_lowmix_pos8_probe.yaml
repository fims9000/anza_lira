# Architecture probe: two encoder stages with low AZ mixture and softer BCE positive weight.
# Target: keep the recall gain from encoder_az_stages=2 while recovering precision.

variant_overrides:
  az_thesis:
    num_rules: 4
    model_widths: [32, 64, 128, 192]

    encoder_az_stages: 2
    encoder_block_mode: hybrid
    hybrid_mix_init: 0.15
    bottleneck_mode: aspp
    decoder_mode: residual
    boundary_mode: conv

    az_geometry_mode: local_hyperbolic
    az_learn_directions: true
    az_min_hyperbolicity: 0.15

    lr: 0.0003
    overlap_mode: dice
    aux_loss_weight: 0.1
    boundary_loss_weight: 0.05
    topology_loss_weight: 0.0
    bce_pos_weight: 8.0

    reg_membership_entropy: 0.0
    reg_membership_smoothness: 0.0
    reg_geometry_smoothness: 0.0001
    reg_hyperbolicity: 0.01
    reg_anisotropy_gap: 0.0

    seg_threshold: 0.5
    eval_threshold_sweep: true
    eval_threshold_metric: core_mean
    eval_threshold_start: 0.25
    eval_threshold_end: 0.95
    eval_threshold_step: 0.05
