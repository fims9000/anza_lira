# Focused local-geometry sweep for the proposed AZ-based method on DRIVE.
# This config keeps the stable U-Net-like decoder/bottleneck and sweeps only
# the recall/precision controls around the current best candidate.

dataset: drive
data_root: ./data
val_fraction: 0.2
use_fov_mask: true

variant: az_thesis
num_rules: 4
model_widths: [32, 64, 128, 192]

encoder_block_mode: hybrid
encoder_az_stages: 2
hybrid_mix_init: 0.15
bottleneck_mode: aspp
decoder_mode: residual
boundary_mode: conv

az_geometry_mode: local_hyperbolic
az_learn_directions: true
az_min_hyperbolicity: 0.15

epochs: 20
batch_size: 2
lr: 0.0003
weight_decay: 0.0001
seed: 42
deterministic: false
num_workers: 0

drive_patch_size: 256
drive_foreground_bias: 0.75

bce_weight: 1.0
dice_weight: 1.0
overlap_mode: dice
tversky_alpha: 0.5
tversky_beta: 0.5
seg_threshold: 0.5
eval_threshold_sweep: true
eval_threshold_metric: core_mean
eval_threshold_start: 0.25
eval_threshold_end: 0.95
eval_threshold_step: 0.05
aux_loss_weight: 0.1
boundary_loss_weight: 0.05
topology_loss_weight: 0.0
topology_num_iters: 10
bce_pos_weight: 8.0
bce_pos_weight_min: 1.0
bce_pos_weight_max: 25.0

reg_membership_entropy: 0.0
reg_membership_smoothness: 0.0
reg_geometry_smoothness: 0.0001
reg_hyperbolicity: 0.01
reg_anisotropy_gap: 0.0

results_dir: ./results
run_name: null
device: null

timing_warmup: 1
timing_iters: 5
